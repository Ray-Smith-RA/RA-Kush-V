<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Резерв+</title>
    <link rel="icon" href="RA.ico" type="image/x-icon">
    <link rel="shortcut icon" href="Image/RA.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="Image/RA.png" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #e8e6d8;
            color: #000;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            padding: 14px 16px;
        }

        .notifications {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #fff;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            box-shadow: 0 2px 6px rgba(0,0,0,.15);
        }

        /* ===== CARD ===== */
        .container {
            padding: 30px 16px 50px;
        }

        .card {
            position: relative;
            padding: 20px;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            /* Скляний ефект */
            background: rgba(0, 0, 0, 0.1); /* напівпрозорий темний фон */
            /*backdrop-filter: blur(10px);*/ /* розмиття фону позаду */
            -webkit-backdrop-filter: blur(10px); /* для Safari */
            /* Витончений темний контур */
            border: 1px solid rgba(0, 0, 0, 0.3);
            /* Тінь для легкого об’єму */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

            .card-header h1 {
                margin: 0;
                font-size: 22px;
                font-weight: 600;
                line-height: 1.2;
            }

        /* ===== LABELS ===== */
        .label {
            margin-top: 16px;
            font-size: 14px;
            color: #555;
        }

        .value {
            margin-top: 4px;
            font-size: 18px;
            font-weight: 500;
        }


        /* ===== TICKER ===== */
        .ticker {
            margin: 80px -20px 10px -20px;
            background: #6a4e27;
            overflow: hidden;
            height: 25px; /* висота стрічки */
            display: flex;
            align-items: center; /* центрування тексту по вертикалі */
        }

        .ticker-track {
            color: white;
            display: flex;
            width: max-content;
            animation: ticker 18s linear infinite;
        }

            /*.ticker-track span {
                font-size: 16px;
                font-weight: 500;
                white-space: nowrap;*/
                /* Відступи тільки з боків, зверху/знизу прибрано */
                /*padding: 0 5px;
                color: #fff;
            }*/

            .ticker-track {
                display: flex;
                flex-wrap: nowrap;
                white-space: nowrap;
                color: #fff;
                animation: ticker 18s linear infinite;
                -webkit-box-orient: horizontal;
            }


        @keyframes ticker {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-50%);
            }
        }

        /* ===== PERSON ===== */
        .person {
            margin-top: 18px;
        }

            .person small {
                font-size: 14px;
                color: #555;
            }

            .person h2 {
                margin: 6px 0 0;
                font-size: 22px;
                font-weight: 600;
                line-height: 1.2;
            }

        /* ===== ADD BUTTON ===== */
        .add-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            background-color: #ff8c00;
            border-radius: 50%;
            color: #fff;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .add-icon {
            width: 32px; /* збільшений розмір */
            height: 32px;
            fill: black; /* чорний колір */
            stroke: black; /* додаємо обведення для ефекту "жирності" */
            stroke-width: 1; /* робить лінії товстішими */
        }


        /* ===== BOTTOM NAV ===== */

        .emblem {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 36px; /* Оптимальний розмір як на скриншоті */
        }

        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background-color: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #e0e0e0;
            padding-bottom: 15px; /* Місце для системної смужки iPhone */
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #000;
            gap: 4px;
        }

            .nav-item span {
                font-size: 12px;
                font-weight: 500;
            }

            .nav-item svg {
                width: 100%; /* підлаштовуємо ширину під контейнер */
                height: auto; /* висота автоматично по пропорціях SVG */
                max-height: 100%; /* не виходить за межі контейнера */
            }

        .icon-box {
            width: 20px;
            height: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

    <script>
        // Поточний час і дата при завантаженні сторінки
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const day = now.getDate().toString().padStart(2, '0');
        const month = (now.getMonth() + 1).toString().padStart(2, '0');
        const year = now.getFullYear();

        const currentTime = `Документ оновлено о ${hours}:${minutes} | ${day}.${month}.${year} • `;

        const tickerTrack = document.getElementById('tickerTrack');

        // Додаємо кілька повторів для прокрутки
        tickerTrack.innerHTML = currentTime.repeat(4);
    </script>
